<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo Harian Ku (Protected Cloud Sync)</title>
  <style>
    :root { --primary: #4f46e5; }
    body {
      font-family: system-ui, sans-serif;
      margin: 0; padding: 20px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      min-height: 100vh;
      color: #333;
    }
    /* Tampilan Layar Kunci Password */
    #lock-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #4f46e5, #8b5cf6);
      display: flex; justify-content: center; align-items: center; z-index: 9999;
    }
    .lock-box {
      background: white; padding: 40px; border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3); text-align: center; max-width: 360px; width: 100%;
    }
    .lock-box h2 { margin-top: 0; color: #333; }
    .lock-box input { width: 80%; margin-bottom: 15px; text-align: center; font-size: 18px; letter-spacing: 3px; }
    
    /* Tampilan Utama Aplikasi */
    .container {
      max-width: 820px; margin: 30px auto;
      background: white; border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15); overflow: hidden;
    }
    header { background: var(--primary); color: white; padding: 25px; text-align: center; position: relative; }
    h1 { margin: 0; font-size: 28px; }

    .sync-indicator {
      position: absolute; top: 15px; right: 20px; font-size: 12px;
      background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 20px;
    }
    .btn-lock-out {
      position: absolute; top: 15px; left: 20px; font-size: 11px;
      background: #ef4444; padding: 4px 10px; border-radius: 20px; border: none; color: white; cursor: pointer;
    }

    .date-nav, .backup-area {
      padding: 15px 25px; background: #f8fafc; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .input-area {
      padding: 20px; background: #f8fafc; display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    }
    input, button { padding: 12px; border-radius: 10px; border: 1px solid #cbd5e1; }
    button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: 600; }
    
    .btn-cloud-push { background: #22c55e; }
    .btn-cloud-push:hover { background: #16a34a; }
    .btn-cloud-pull { background: #0ea5e9; }
    .btn-cloud-pull:hover { background: #0284c7; }

    .task-list, .history-list { list-style: none; padding: 0; margin: 0; }
    .task-item { padding: 16px 25px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: flex-start; gap: 12px; }
    .task-item.done { opacity: 0.75; text-decoration: line-through; color: #64748b; }
    .recurring { color: #22c55e; font-size: 13px; }

    .task-main { flex: 1; cursor: pointer; font-weight: 500; }
    .subtasks { margin-left: 20px; margin-top: 8px; font-size: 14px; }
    .subtask-item { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
    .btn-subtask { background: #eef2ff; color: #4f46e5; font-size: 12px; padding: 6px 12px; border-radius: 6px; margin-top: 8px; }
    
    .timestamp { font-size: 12px; color: #64748b; margin-left: auto; }
    .section-title { padding: 15px 25px 5px; font-weight: 600; color: #64748b; }
    .btn-delete-sub { background: none; color: #ef4444; padding: 2px 6px; font-size: 11px; border-radius: 4px; }
    .btn-delete-sub:hover { background: #ffeeee; }
  </style>
</head>
<body>

  <div id="lock-screen">
    <div class="lock-box">
      <h2 id="lock-title">🔐 Masukkan Password</h2>
      <p id="lock-desc" style="color: #64748b; font-size: 14px; margin-bottom: 20px;">Aplikasi ini dilindungi kunci keamanan</p>
      <input type="password" id="password-input" placeholder="••••">
      <br>
      <button onclick="checkPassword()" style="width: 80%;">Buka Aplikasi</button>
    </div>
  </div>

  <div class="container">
    <header>
      <button class="btn-lock-out" onclick="lockApp()">🔒 Kunci</button>
      <h1>📅 ToDo Harian Ku</h1>
      <div class="status" id="time-status">Memuat waktu aplikasi...</div>
      <div class="sync-indicator" id="sync-status">Penyimpanan Lokal (Offline)</div>
    </header>

    <div class="date-nav">
      <button onclick="prevDay()">← Kemarin</button>
      <input type="date" id="selected-date" onchange="changeDate()">
      <button onclick="nextDay()">Besok →</button>
      <button onclick="goToToday()">Hari Ini</button>
    </div>

    <div class="input-area">
      <input type="text" id="search-input" placeholder="Cari tugas..." style="flex:1;" oninput="loadTasks()">
    </div>

    <div style="padding:10px 25px;background:#eef2ff;">
      <div id="stats">0/0 selesai</div>
      <div style="width:100%;background:#ddd;border-radius:8px;height:10px;margin-top:6px;">
        <div id="progress-bar" style="height:10px;width:0%;background:#4f46e5;border-radius:8px;"></div>
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="task-input" placeholder="Tambah tugas baru..." style="flex:1;">
      <label><input type="checkbox" id="recurring"> Ulang tiap hari</label>
      <button id="btn-add" onclick="addTask()">Tambah</button>
    </div>

    <div class="section-title">Tugas Hari Ini</div>
    <ul class="task-list" id="task-list"></ul>

    <div class="section-title">📝 Catatan / Tugas Selesai</div>
    <ul class="history-list" id="history-list"></ul>

    <div class="backup-area" style="justify-content: center; background: #f1f5f9; border-top: 2px dashed #cbd5e1;">
      <button class="btn-cloud-push" onclick="manualSaveToCloud()">📤 Kirim Data ke Cloud</button>
      <button class="btn-cloud-pull" onclick="manualFetchFromCloud()">📥 Tarik Data dari Cloud</button>
      <button onclick="resetPasswordManual()" style="background:#64748b;">🔑 Ganti Password</button>
    </div>
  </div>

  <script>
    let currentDateKey = new Date().toISOString().split('T')[0];
    const recurringKey = 'recurringTasks';
    const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbxVmeGMsPSkHHxyGOh3YSKngZFTbp0JHF7uPlCa80ttb2fcnYxlelnTDkrhawVGT68KbA/exec";

    // --- SISTEM KEAMANAN PASSWORD (HASH SEDERHANA) ---
    function hashString(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0;
      }
      return hash.toString();
    }

    function initSecurity() {
      const savedHash = localStorage.getItem('app_pwd_hash');
      if (!savedHash) {
        document.getElementById('lock-title').textContent = "🆕 Buat Password Baru";
        document.getElementById('lock-desc').textContent = "Karena ini pertama kali, silakan tentukan password rahasiamu.";
      }
    }

    function checkPassword() {
      const input = document.getElementById('password-input').value;
      if (!input) return alert("Password tidak boleh kosong!");
      
      const inputHash = hashString(input);
      const savedHash = localStorage.getItem('app_pwd_hash');

      if (!savedHash) {
        // Pembuatan password pertama kali
        localStorage.setItem('app_pwd_hash', inputHash);
        alert("Password berhasil dibuat! Jaga kerahasiaannya.");
        document.getElementById('lock-screen').style.display = 'none';
        sessionStorage.setItem('is_logged_in', 'true');
      } else if (inputHash === savedHash) {
        // Password Benar
        document.getElementById('lock-screen').style.display = 'none';
        sessionStorage.setItem('is_logged_in', 'true');
        document.getElementById('password-input').value = '';
      } else {
        alert("❌ Password salah! Akses ditolak.");
        document.getElementById('password-input').value = '';
      }
    }

    function lockApp() {
      sessionStorage.removeItem('is_logged_in');
      document.getElementById('lock-screen').style.display = 'flex';
      document.getElementById('lock-title').textContent = "🔐 Masukkan Password";
      document.getElementById('lock-desc').textContent = "Aplikasi terkunci kembali.";
    }

    function resetPasswordManual() {
      const oldPwd = prompt("Masukkan password lamamu:");
      if (!oldPwd) return;
      if (hashString(oldPwd) !== localStorage.getItem('app_pwd_hash')) return alert("Password lama salah!");
      
      const newPwd = prompt("Masukkan password barumu:");
      if (!newPwd || !newPwd.trim()) return alert("Password baru tidak valid!");
      
      localStorage.setItem('app_pwd_hash', hashString(newPwd.trim()));
      alert("Password sukses diganti! Silakan kunci kembali jika sudah selesai.");
    }

    // --- MANAJEMEN CLOUD GOOGLE SHEETS ---
    async function manualSaveToCloud() {
      if (!CLOUD_API_URL) return alert("URL Cloud tidak terkonfigurasi!");
      document.getElementById('sync-status').textContent = "🔄 Mengirim ke Cloud...";
      
      const allData = {};
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        allData[key] = localStorage.getItem(key);
      }

      try {
        await fetch(CLOUD_API_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(allData)
        });
        document.getElementById('sync-status').textContent = "✅ Berhasil Diunggah";
        alert("Data lokal berhasil dikirim dan diamankan di Google Sheets!");
      } catch (e) {
        document.getElementById('sync-status').textContent = "❌ Gagal Mengunggah";
        alert("Gagal terhubung ke Cloud.");
      }
    }

    async function manualFetchFromCloud() {
      if (!CLOUD_API_URL) return alert("URL Cloud tidak terkonfigurasi!");
      if (!confirm("Peringatan: Data di perangkat ini akan diganti dengan data terakhir dari Google Sheets. Lanjutkan?")) return;
      
      document.getElementById('sync-status').textContent = "🔄 Mengambil dari Cloud...";
      try {
        const res = await fetch(CLOUD_API_URL);
        const cloudData = await res.json();
        
        // Simpan hash password lama agar tidak hilang terhapus data cloud
        const currentHash = localStorage.getItem('app_pwd_hash');
        
        localStorage.clear();
        Object.keys(cloudData).forEach(key => {
          localStorage.setItem(key, cloudData[key]);
        });
        
        // Kembalikan hash password lokal setelah clear data cloud
        localStorage.setItem('app_pwd_hash', currentHash);
        
        document.getElementById('sync-status').textContent = "✅ Data Cloud Terpasang";
        loadTasks();
        alert("Data dari Google Sheets berhasil ditarik!");
      } catch (e) {
        document.getElementById('sync-status').textContent = "❌ Gagal Menarik Data";
        alert("Gagal mengambil data dari Cloud.");
      }
    }

    // --- LOGIKA TASKS (TIDAK BERUBAH) ---
    function loadRecurringTasks() { return JSON.parse(localStorage.getItem(recurringKey)) || []; }
    function saveRecurringTasks(rec) { localStorage.setItem(recurringKey, JSON.stringify(rec)); }

    function loadTasks() {
      let tasks = JSON.parse(localStorage.getItem('tasks_' + currentDateKey)) || [];
      const recurring = loadRecurringTasks();
      let updated = false;
      recurring.forEach(r => {
        if (!tasks.some(t => t.text === r.text)) {
          tasks.push({ text: r.text, done: false, recurring: true, description: "", subTasks: [], completedAt: null });
          updated = true;
        }
      });
      if (updated || !localStorage.getItem('tasks_' + currentDateKey)) {
        localStorage.setItem('tasks_' + currentDateKey, JSON.stringify(tasks));
      }
      renderAll(tasks);
    }

    function updateStats(tasks) {
      const total = tasks.length;
      const done = tasks.filter(t => t.done).length;
      const percent = total ? Math.round(done / total * 100) : 0;
      document.getElementById('stats').textContent = `${done}/${total} selesai (${percent}%)`;
      document.getElementById('progress-bar').style.width = percent + '%';
    }

    function renderAll(tasks) { renderTasks(tasks); renderHistory(tasks); updateStats(tasks); }

    function renderTasks(tasks) {
      const list = document.getElementById('task-list');
      list.innerHTML = '';
      const keyword = (document.getElementById('search-input').value || '').toLowerCase();

      tasks.forEach((task, i) => {
        if (keyword && !task.text.toLowerCase().includes(keyword)) return;
        const li = document.createElement('li');
        li.className = `task-item ${task.done ? 'done' : ''}`;
        li.innerHTML = `
          <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleDone(${i})">
          <div style="flex:1">
            <div class="task-main" onclick="editTask(${i})">${task.text}</div>
            ${task.description ? `<small style="color:#64748b; display:block; margin-top:2px;">${task.description}</small>` : ''}
            <div class="subtasks" id="subtasks-${i}"></div>
            <button class="btn-subtask" onclick="addSubTask(${i})">+ Sub Task</button>
          </div>
          ${task.recurring ? '<span class="recurring">↻ Harian</span>' : ''}
          <button onclick="deleteTask(${i})" style="background:#ef4444;color:white;border:none;padding:6px 12px;border-radius:6px;margin-left:8px;">Hapus</button>
        `;
        list.appendChild(li);
        renderSubTasks(i, task.subTasks || []);
      });
    }

    function renderSubTasks(taskIndex, subTasks) {
      const container = document.getElementById(`subtasks-${taskIndex}`);
      if (!container) return;
      container.innerHTML = '';
      subTasks.forEach((sub, subIndex) => {
        const div = document.createElement('div');
        div.className = 'subtask-item';
        div.innerHTML = `
          <input type="checkbox" ${sub.done ? 'checked' : ''} onchange="toggleSubTask(${taskIndex}, ${subIndex})">
          <span style="flex:1; ${sub.done ? 'text-decoration:line-through;opacity:0.7' : ''}">${sub.text}</span>
          <button class="btn-delete-sub" onclick="deleteSubTask(${taskIndex}, ${subIndex})">×</button>
        `;
        container.appendChild(div);
      });
    }

    function renderHistory(tasks) {
      const historyList = document.getElementById('history-list');
      historyList.innerHTML = '';
      const completed = tasks.filter(t => t.done);
      if (completed.length === 0) {
        historyList.innerHTML = `<li style="padding:25px; color:#94a3b8; text-align:center;">Belum ada tugas selesai hari ini</li>`;
        return;
      }
      completed.forEach(task => {
        const li = document.createElement('li');
        li.style.padding = '14px 25px'; li.style.display = 'flex';
        li.innerHTML = `✅ <span style="flex:1; margin-left:10px;">${task.text}</span><span class="timestamp">${task.completedAt || ''}</span>`;
        historyList.appendChild(li);
      });
    }

    function addTask() {
      const text = document.getElementById('task-input').value.trim();
      if (!text) return;
      let tasks = JSON.parse(localStorage.getItem('tasks_' + currentDateKey)) || [];
      const isRecurring = document.getElementById('recurring').checked;
      tasks.push({ text, done: false, recurring: isRecurring, description: "", subTasks: [], completedAt: null });
      if (isRecurring) {
        let rec = loadRecurringTasks();
        if (!rec.some(r => r.text === text)) rec.push({ text });
        saveRecurringTasks(rec);
      }
      localStorage.setItem('tasks_' + currentDateKey, JSON.stringify(tasks));
      document.getElementById('task-input').value = '';
      document.getElementById('recurring').checked = false;
      loadTasks();
    }

    function editTask(i) {
      let tasks = JSON.parse(localStorage.getItem('tasks_' + currentDateKey)) || [];
      const task = tasks[i];
      const newText = prompt("Edit nama tugas:", task.text);
      if (newText !== null && newText.trim() !== "") task.text = newText.trim();
      const desc = prompt("Deskripsi tugas:", task.description || "");
      if (desc !== null) task.description = desc.trim();
      localStorage.setItem('tasks_' + currentDateKey, JSON.stringify(tasks));
      loadTasks();
    }

    function toggleDone(i) {
      let tasks = JSON.parse(localStorage.getItem('tasks_' + currentDateKey)) || [];
      const task = tasks[i];
      if (!task.done) {
        const now = new Date();
        task.completedAt = now.toLocaleString('id-ID', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
      } else { delete task.completedAt; }
      task.done = !task.done;
      localStorage.setItem('tasks_' + currentDateKey, JSON.stringify(tasks));
      loadTasks();
    }

    function addSubTask(taskIndex) {
      const text = prompt("Sub task baru:");
      if (!text || !text.trim()) return;
      let tasks = JSON.parse(localStorage.getItem('tasks_' + currentDateKey)) || [];
      if (!tasks[taskIndex].subTasks) tasks[taskIndex].subTasks = [];
      tasks[taskIndex].subTasks.push({ text: text.trim(), done: false });
      localStorage.setItem('tasks_' + currentDateKey, JSON.stringify(tasks));
      loadTasks();
    }

    function toggleSubTask(taskIndex, subIndex) {
      let tasks = JSON.parse(localStorage.getItem('tasks_' + currentDateKey)) || [];
      tasks[taskIndex].subTasks[subIndex].done = !tasks[taskIndex].subTasks[subIndex].done;
      localStorage.setItem('tasks_' + currentDateKey, JSON.stringify(tasks));
      loadTasks();
    }

    function deleteSubTask(taskIndex, subIndex) {
      let tasks = JSON.parse(localStorage.getItem('tasks_' + currentDateKey)) || [];
      tasks[taskIndex].subTasks.splice(subIndex, 1);
      localStorage.setItem('tasks_' + currentDateKey, JSON.stringify(tasks));
      loadTasks();
    }

    function deleteTask(i) {
      if (!confirm("Hapus tugas ini?")) return;
      let tasks = JSON.parse(localStorage.getItem('tasks_' + currentDateKey)) || [];
      const task = tasks[i];
      if (task.recurring && confirm("Hapus juga dari sistem pengulangan (Recurring)?")) {
        let rec = loadRecurringTasks().filter(r => r.text !== task.text);
        saveRecurringTasks(rec);
      }
      tasks.splice(i, 1);
      localStorage.setItem('tasks_' + currentDateKey, JSON.stringify(tasks));
      loadTasks();
    }

    function changeDate() { currentDateKey = document.getElementById('selected-date').value; loadTasks(); }
    function prevDay() { let d = new Date(currentDateKey); d.setDate(d.getDate()-1); currentDateKey = d.toISOString().split('T')[0]; document.getElementById('selected-date').value = currentDateKey; loadTasks(); }
    function nextDay() { let d = new Date(currentDateKey); d.setDate(d.getDate()+1); currentDateKey = d.toISOString().split('T')[0]; document.getElementById('selected-date').value = currentDateKey; loadTasks(); }
    function goToToday() { currentDateKey = new Date().toISOString().split('T')[0]; document.getElementById('selected-date').value = currentDateKey; loadTasks(); }

    window.onload = () => {
      initSecurity();
      // Cek status login sesi ini
      if (sessionStorage.getItem('is_logged_in') === 'true') {
        document.getElementById('lock-screen').style.display = 'none';
      }
      document.getElementById('selected-date').value = currentDateKey;
      document.getElementById('time-status').innerHTML = `📅 Waktu Lokal: ${currentDateKey}`;
      loadTasks();
    };

    // Shortcut tombol enter pada password & task input
    document.getElementById('password-input').addEventListener('keypress', e => { if (e.key === 'Enter') checkPassword(); });
    document.getElementById('task-input').addEventListener('keypress', e => { if (e.key === 'Enter') addTask(); });
  </script>
</body>
</html>
